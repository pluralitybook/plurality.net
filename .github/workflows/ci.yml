name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  BUN_VERSION: latest

jobs:
  # 1. Fast unit + data-integrity tests — always run first, fail fast.
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun --bun install --frozen-lockfile

      - name: Run static checks
        run: bun --bun run check

      - name: Run lint
        run: bun --bun run lint

      - name: Run unit tests (coverage enforced at 100% via vp test)
        run: bun --bun run test:unit

      - name: Upload coverage LCOV
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage
          path: coverage
          retention-days: 14
          if-no-files-found: ignore

  worker:
    name: plurality-ask worker
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: cd worker && bun --bun install --frozen-lockfile && bun --bun test

  # 2. Build the static site and upload as an artifact for downstream jobs.
  build:
    name: Build site
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: unit
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - name: Cache remote text fetch
        uses: actions/cache@v6
        with:
          path: .cache
          key: eleventy-fetch-${{ runner.os }}-${{ github.run_id }}
          restore-keys: eleventy-fetch-${{ runner.os }}-

      - run: bun --bun install --frozen-lockfile

      - name: Build
        run: bun --bun run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist
          retention-days: 7
          if-no-files-found: error

  # 3. Regression tests against the built output.
  regression:
    name: Regression tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun --bun install --frozen-lockfile

      - name: Download dist
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist

      - run: bun --bun run test:regression

  # 4. HTML validation on the built output.
  html-validate:
    name: HTML validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun --bun install --frozen-lockfile

      - name: Download dist
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist

      - run: bun --bun run lint:html

  # 5. Full E2E test matrix across browsers.
  e2e:
    name: E2E (${{ matrix.project }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit, mobile-chrome]
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun install
        uses: actions/cache@v6
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun --bun install --frozen-lockfile

      - name: Download dist
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist

      - name: Get Playwright version
        id: playwright-version
        run: |
          version=$(bun pm ls 2>/dev/null | awk '/@playwright\/test/ {print $NF; exit}')
          test -n "$version" || { echo "Unable to resolve Playwright version"; exit 1; }
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v6
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}-${{ matrix.project }}

      - name: Install Playwright browser
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: bun --bun x playwright install --with-deps ${{ matrix.project == 'mobile-chrome' && 'chromium' || matrix.project }}

      - name: Install Playwright OS deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: bun --bun x playwright install-deps ${{ matrix.project == 'mobile-chrome' && 'chromium' || matrix.project }}

      - name: Run Playwright
        run: bun --bun x playwright test --project=${{ matrix.project }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-${{ matrix.project }}
          path: playwright-report
          retention-days: 14

      - name: Upload failures
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-failures-${{ matrix.project }}
          path: test-results
          retention-days: 7

  # 6. Link check across all internal references.
  link-check:
    name: Link check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    steps:
      - uses: actions/checkout@v7

      - name: Download dist
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist

      - name: Restore lychee cache
        uses: actions/cache@v6
        with:
          path: .lycheecache
          key: lychee-${{ github.run_id }}
          restore-keys: lychee-

      - uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml --cache --offline --root-dir ${{ github.workspace }}/dist ./dist
          fail: false
          jobSummary: true

  # 7. Lighthouse performance + a11y budget (non-blocking via assertions config).
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Download dist
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist

      - run: bun --bun x @lhci/cli@0.14.x autorun --config=./.lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  # 8. Summary: the one required status check for branch protection.
  ci:
    name: CI summary
    runs-on: ubuntu-latest
    needs: [unit, worker, build, regression, html-validate, e2e, link-check]
    if: always()
    steps:
      - name: Verify all required jobs passed
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          echo "$NEEDS_JSON"
          fail=0
          for job in unit worker build regression html-validate e2e link-check; do
            result=$(echo "$NEEDS_JSON" | jq -r ".\"$job\".result")
            echo "$job -> $result"
            if [ "$result" != "success" ]; then fail=1; fi
          done
          exit $fail
