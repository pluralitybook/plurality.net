name: Sync Translations

on:
  schedule:
    # Run every hour
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Vite+ CLI
        run: curl -fsSL https://vite.plus | bash
        env:
          VP_NODE_MANAGER: 'yes'

      - name: Add Vite+ to PATH
        run: echo "$HOME/.vite-plus/bin" >> "$GITHUB_PATH"

      - run: vp install --frozen-lockfile

      - name: Sync translations from upstream repos
        run: vp run sync-translations
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet src/data/translations.json || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/translations.json
          git commit -m "Sync translations from upstream repos"
          git push
