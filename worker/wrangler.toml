name = "plurality-ask"
main = "src/index.ts"
compatibility_date = "2025-01-01"
workers_dev = true


# Uncomment when ask.plurality.net is a proxied DNS name in this CF account:
# [[routes]]
# pattern = "ask.plurality.net"
# custom_domain = true

[vars]
AUDREY_MODEL = "nemotron-ultra"

[ai]
binding = "AI"

[[vectorize]]
binding = "BOOK_VECTORIZE"
index_name = "plurality-book"

# Create index (once): wrangler vectorize create plurality-book --dimensions=1024 --metric=cosine
# Metadata index on `lang` when upserting (see scripts/vectorize-sync-book.mjs)
# Secrets: BASETEN_API_KEY, CF_AIG_TOKEN (wrangler secret put)

[dev]
port = 8788